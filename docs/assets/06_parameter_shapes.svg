<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 520" role="img" aria-labelledby="title desc">
  <title id="title">Makemore MLP parameter shapes</title>
  <desc id="desc">A diagram showing the five learned tensors C, W1, b1, W2, and b2 and why each shape is chosen.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .box { fill: #ffffff; stroke: #d7dce2; stroke-width: 1.5; }
      .dim { fill: #f4f7fb; stroke: #cbd5e1; stroke-width: 1.2; }
      .ink { fill: #1f2933; }
      .muted { fill: #627084; }
      .blue { fill: #2563eb; }
      .green { fill: #059669; }
      .orange { fill: #d97706; }
      .red { fill: #dc2626; }
      .line { stroke: #66758a; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .label { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758a"/>
    </marker>
  </defs>
  <rect class="bg" width="1160" height="520" rx="18"/>
  <text x="38" y="48" class="label ink">Parameter shapes come from input axis -> output axis</text>
  <text x="38" y="78" class="text muted">For x @ W, W has shape [features in, features out]. Bias has [features out].</text>

  <g transform="translate(58 128)">
    <rect x="0" y="0" width="190" height="125" rx="12" class="box"/>
    <text x="24" y="35" class="label green">C</text>
    <text x="24" y="64" class="text ink">[27, 10]</text>
    <text x="24" y="92" class="small muted">27 tokens</text>
    <text x="24" y="112" class="small muted">10 numbers each</text>

    <path d="M205 62 L275 62" class="line"/>
    <text x="218" y="43" class="small muted">lookup</text>

    <rect x="290" y="0" width="190" height="125" rx="12" class="box"/>
    <text x="314" y="35" class="label orange">W1</text>
    <text x="314" y="64" class="text ink">[30, 200]</text>
    <text x="314" y="92" class="small muted">3*10 inputs</text>
    <text x="314" y="112" class="small muted">200 hidden out</text>

    <rect x="510" y="0" width="135" height="125" rx="12" class="box"/>
    <text x="534" y="35" class="label blue">b1</text>
    <text x="534" y="64" class="text ink">[200]</text>
    <text x="534" y="92" class="small muted">one per</text>
    <text x="534" y="112" class="small muted">hidden unit</text>

    <path d="M665 62 L735 62" class="line"/>
    <text x="680" y="43" class="small muted">tanh</text>

    <rect x="750" y="0" width="190" height="125" rx="12" class="box"/>
    <text x="774" y="35" class="label red">W2</text>
    <text x="774" y="64" class="text ink">[200, 27]</text>
    <text x="774" y="92" class="small muted">200 hidden in</text>
    <text x="774" y="112" class="small muted">27 scores out</text>

    <rect x="970" y="0" width="115" height="125" rx="12" class="box"/>
    <text x="994" y="35" class="label blue">b2</text>
    <text x="994" y="64" class="text ink">[27]</text>
    <text x="994" y="92" class="small muted">one per</text>
    <text x="994" y="112" class="small muted">token</text>
  </g>

  <g transform="translate(112 315)">
    <rect x="0" y="0" width="235" height="110" rx="12" class="dim"/>
    <text x="24" y="34" class="text ink">embedding lookup</text>
    <text x="24" y="64" class="small muted">Xb [32,3]</text>
    <text x="24" y="88" class="small muted">C[Xb] [32,3,10]</text>

    <rect x="295" y="0" width="235" height="110" rx="12" class="dim"/>
    <text x="319" y="34" class="text ink">flatten context</text>
    <text x="319" y="64" class="small muted">[32,3,10]</text>
    <text x="319" y="88" class="small muted">-> [32,30]</text>

    <rect x="590" y="0" width="235" height="110" rx="12" class="dim"/>
    <text x="614" y="34" class="text ink">hidden features</text>
    <text x="614" y="64" class="small muted">[32,30] @ [30,200]</text>
    <text x="614" y="88" class="small muted">-> [32,200]</text>
  </g>
</svg>
