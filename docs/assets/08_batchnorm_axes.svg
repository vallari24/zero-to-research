<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">BatchNorm averages over batch and position axes</title>
  <desc id="desc">For a tensor shaped B by T by C, BatchNorm fixes one channel and averages that channel across every batch example and sequence position.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .cell { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.3; }
      .focus { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.7; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; }
      .out { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.6; }
      .ink { fill: #111827; }
      .muted { fill: #4b5563; }
      .blue { fill: #1d4ed8; }
      .green { fill: #047857; }
      .red { fill: #b91c1c; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .title { font: 800 27px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { font: 600 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 600 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .shape { font: 800 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1160" height="620" rx="20"/>
  <text class="title ink" x="34" y="48">BatchNorm for [B, T, C]: normalize one channel across B and T</text>
  <text class="text muted" x="34" y="78">Example hidden tensor: [4 examples, 4 positions, 200 channels]</text>

  <text class="mono blue" x="120" y="140">fix one channel: c = 7</text>
  <text class="small muted" x="120" y="166">collect x[every example, every position, 7]</text>
  <text class="mono muted" x="64" y="234">batch</text>
  <text class="mono muted" x="64" y="258">axis B</text>
  <text class="mono muted" x="164" y="204">position axis T</text>

  <g>
    <rect class="focus" x="160" y="226" width="100" height="54" rx="7"/>
    <rect class="focus" x="268" y="226" width="100" height="54" rx="7"/>
    <rect class="focus" x="376" y="226" width="100" height="54" rx="7"/>
    <rect class="focus" x="484" y="226" width="100" height="54" rx="7"/>
    <rect class="focus" x="160" y="288" width="100" height="54" rx="7"/>
    <rect class="focus" x="268" y="288" width="100" height="54" rx="7"/>
    <rect class="focus" x="376" y="288" width="100" height="54" rx="7"/>
    <rect class="focus" x="484" y="288" width="100" height="54" rx="7"/>
    <rect class="focus" x="160" y="350" width="100" height="54" rx="7"/>
    <rect class="focus" x="268" y="350" width="100" height="54" rx="7"/>
    <rect class="focus" x="376" y="350" width="100" height="54" rx="7"/>
    <rect class="focus" x="484" y="350" width="100" height="54" rx="7"/>
    <text class="mono blue" x="180" y="258">x[0,0,7]</text>
    <text class="mono blue" x="288" y="258">x[0,1,7]</text>
    <text class="mono blue" x="396" y="258">x[0,2,7]</text>
    <text class="mono blue" x="504" y="258">x[0,3,7]</text>
    <text class="mono blue" x="180" y="320">x[1,0,7]</text>
    <text class="mono blue" x="288" y="320">x[1,1,7]</text>
    <text class="mono blue" x="396" y="320">x[1,2,7]</text>
    <text class="mono blue" x="504" y="320">x[1,3,7]</text>
    <text class="mono muted" x="198" y="382">...</text>
    <text class="mono muted" x="306" y="382">...</text>
    <text class="mono muted" x="414" y="382">...</text>
    <text class="mono muted" x="522" y="382">...</text>
  </g>

  <path class="line" d="M596 314 L690 314"/>
  <rect class="card" x="696" y="234" width="204" height="160" rx="10"/>
  <text class="shape ink" x="734" y="270">average all</text>
  <text class="shape ink" x="734" y="298">B * T values</text>
  <text class="mono blue" x="730" y="340">dim = (0, 1)</text>
  <text class="small muted" x="720" y="372">do not average C</text>

  <path class="line" d="M902 314 L966 314"/>
  <rect class="out" x="972" y="248" width="156" height="132" rx="10"/>
  <text class="mono green" x="995" y="284">mean[7]</text>
  <text class="mono green" x="990" y="316">variance[7]</text>
  <text class="small muted" x="991" y="350">one pair of stats</text>
  <text class="small muted" x="1018" y="368">for channel 7</text>

  <rect class="card" x="120" y="482" width="1008" height="92" rx="10"/>
  <text class="mono ink" x="148" y="516">x.mean(dim=(0, 1), keepdim=True)</text>
  <text class="text muted" x="148" y="548">Remove axes B and T. Keep C separate. Result shape: [1, 1, 200].</text>
</svg>
