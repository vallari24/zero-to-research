<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">View and reshape as regrouping</title>
  <desc id="desc">A visual explanation that view keeps the same scalar storage but regroups the numbers from shape two by three by two into shape two by six.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .panel { fill: #ffffff; stroke: #d7dce2; stroke-width: 1.5; }
      .ink { fill: #1f2933; }
      .muted { fill: #627084; }
      .green { fill: #059669; }
      .orange { fill: #d97706; }
      .blue { fill: #2563eb; }
      .cellA { fill: #ecfdf5; stroke: #7dc8a2; stroke-width: 1.2; }
      .cellB { fill: #fff7ed; stroke: #e6a155; stroke-width: 1.2; }
      .tape { fill: #eef2ff; stroke: #8ea2d8; stroke-width: 1.2; }
      .rule { fill: #f8fafc; stroke: #c8d0da; stroke-width: 1.2; }
      .line { stroke: #66758a; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .label { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758a"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560" rx="18"/>
  <text x="38" y="48" class="label ink">view changes the grouping, not the values</text>
  <text x="38" y="78" class="text muted">Think of the tensor as one storage tape.</text>
  <text x="38" y="103" class="text muted">Shape decides where you draw the dividers.</text>

  <rect x="54" y="132" width="872" height="82" rx="10" class="panel"/>
  <text x="78" y="165" class="text blue">same 12 scalar values in memory order</text>
  <g transform="translate(78 178)">
    <rect x="0" y="0" width="40" height="26" class="tape"/><text x="14" y="18" class="small ink">1</text>
    <rect x="40" y="0" width="40" height="26" class="tape"/><text x="50" y="18" class="small ink">10</text>
    <rect x="80" y="0" width="40" height="26" class="tape"/><text x="94" y="18" class="small ink">2</text>
    <rect x="120" y="0" width="40" height="26" class="tape"/><text x="130" y="18" class="small ink">20</text>
    <rect x="160" y="0" width="40" height="26" class="tape"/><text x="174" y="18" class="small ink">3</text>
    <rect x="200" y="0" width="40" height="26" class="tape"/><text x="210" y="18" class="small ink">30</text>
    <rect x="240" y="0" width="40" height="26" class="tape"/><text x="254" y="18" class="small ink">4</text>
    <rect x="280" y="0" width="40" height="26" class="tape"/><text x="290" y="18" class="small ink">40</text>
    <rect x="320" y="0" width="40" height="26" class="tape"/><text x="334" y="18" class="small ink">5</text>
    <rect x="360" y="0" width="40" height="26" class="tape"/><text x="370" y="18" class="small ink">50</text>
    <rect x="400" y="0" width="40" height="26" class="tape"/><text x="414" y="18" class="small ink">6</text>
    <rect x="440" y="0" width="40" height="26" class="tape"/><text x="450" y="18" class="small ink">60</text>
  </g>

  <rect x="54" y="250" width="390" height="230" rx="10" class="panel"/>
  <text x="78" y="283" class="label green">shape [2,3,2]</text>
  <text x="78" y="311" class="small muted">2 examples; 3 vectors each; 2 values per vector</text>
  <g transform="translate(78 350)">
    <text x="0" y="-12" class="small muted">example 0</text>
    <rect x="0" y="0" width="58" height="38" rx="5" class="cellA"/><text x="13" y="24" class="small ink">1 10</text>
    <rect x="70" y="0" width="58" height="38" rx="5" class="cellA"/><text x="83" y="24" class="small ink">2 20</text>
    <rect x="140" y="0" width="58" height="38" rx="5" class="cellA"/><text x="153" y="24" class="small ink">3 30</text>
    <text x="0" y="78" class="small muted">example 1</text>
    <rect x="0" y="92" width="58" height="38" rx="5" class="cellB"/><text x="13" y="116" class="small ink">4 40</text>
    <rect x="70" y="92" width="58" height="38" rx="5" class="cellB"/><text x="83" y="116" class="small ink">5 50</text>
    <rect x="140" y="92" width="58" height="38" rx="5" class="cellB"/><text x="153" y="116" class="small ink">6 60</text>
  </g>

  <path d="M470 365 L540 365" class="line"/>
  <text x="466" y="336" class="text ink">view(2, 6)</text>
  <text x="462" y="393" class="small muted">keep 2 rows</text>
  <text x="462" y="415" class="small muted">infer 6 columns</text>

  <rect x="562" y="250" width="364" height="230" rx="10" class="panel"/>
  <text x="586" y="283" class="label orange">shape [2,6]</text>
  <text x="586" y="311" class="small muted">same examples; one flat feature axis</text>
  <g transform="translate(586 350)">
    <rect x="0" y="0" width="276" height="38" rx="5" class="cellA"/>
    <line x1="46" y1="0" x2="46" y2="38" stroke="#7dc8a2"/>
    <line x1="92" y1="0" x2="92" y2="38" stroke="#7dc8a2"/>
    <line x1="138" y1="0" x2="138" y2="38" stroke="#7dc8a2"/>
    <line x1="184" y1="0" x2="184" y2="38" stroke="#7dc8a2"/>
    <line x1="230" y1="0" x2="230" y2="38" stroke="#7dc8a2"/>
    <text x="13" y="24" class="small ink">1</text><text x="54" y="24" class="small ink">10</text>
    <text x="105" y="24" class="small ink">2</text><text x="146" y="24" class="small ink">20</text>
    <text x="197" y="24" class="small ink">3</text><text x="238" y="24" class="small ink">30</text>
    <rect x="0" y="78" width="276" height="38" rx="5" class="cellB"/>
    <line x1="46" y1="78" x2="46" y2="116" stroke="#e6a155"/>
    <line x1="92" y1="78" x2="92" y2="116" stroke="#e6a155"/>
    <line x1="138" y1="78" x2="138" y2="116" stroke="#e6a155"/>
    <line x1="184" y1="78" x2="184" y2="116" stroke="#e6a155"/>
    <line x1="230" y1="78" x2="230" y2="116" stroke="#e6a155"/>
    <text x="13" y="102" class="small ink">4</text><text x="54" y="102" class="small ink">40</text>
    <text x="105" y="102" class="small ink">5</text><text x="146" y="102" class="small ink">50</text>
    <text x="197" y="102" class="small ink">6</text><text x="238" y="102" class="small ink">60</text>
  </g>

  <rect x="126" y="506" width="728" height="36" rx="8" class="rule"/>
  <text x="152" y="529" class="text ink">Rule: 2 * 3 * 2 = 12 and 2 * 6 = 12. Same values.</text>
</svg>
