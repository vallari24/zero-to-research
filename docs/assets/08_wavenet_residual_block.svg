<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" role="img" aria-labelledby="title desc">
  <title id="title">One WaveNet residual block</title>
  <desc id="desc">An input state passes through causal dilated convolutions, tanh and sigmoid branches, an elementwise gate, and one-by-one projections. A residual update is added back to the original state while a skip contribution is sent toward the output network.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.7; }
      .blue-card { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.8; }
      .green-card { fill: #ecfdf5; stroke: #34d399; stroke-width: 1.8; }
      .amber-card { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; }
      .violet-card { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.8; }
      .circle { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .bypass { stroke: #2563eb; stroke-width: 2.6; fill: none; marker-end: url(#blue-arrow); }
      .skip { stroke: #059669; stroke-width: 2.6; fill: none; marker-end: url(#green-arrow); }
      .ink { fill: #111827; }
      .muted { fill: #4b5563; }
      .blue { fill: #1d4ed8; }
      .green { fill: #047857; }
      .amber { fill: #b45309; }
      .title { font: 800 27px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { font: 600 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 600 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .symbol { font: 800 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="blue-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="green-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect class="bg" width="1240" height="720" rx="20"/>
  <text class="title ink" x="34" y="48">One residual block: refine the state and also report useful evidence</text>
  <text class="text muted" x="34" y="78">The block has two outputs: an updated state for the next block and a skip contribution for the final prediction.</text>

  <rect class="blue-card" x="48" y="298" width="134" height="78" rx="11"/>
  <text class="mono blue" x="96" y="330">x</text>
  <text class="small muted" x="68" y="354">input state</text>

  <path class="line" d="M182 337 L244 337"/>
  <rect class="blue-card" x="250" y="279" width="192" height="116" rx="11"/>
  <text class="mono blue" x="277" y="322">causal dilated</text>
  <text class="mono blue" x="299" y="348">convolutions</text>
  <text class="small muted" x="277" y="374">read earlier positions</text>

  <path class="line" d="M442 319 L502 239"/>
  <path class="line" d="M442 355 L502 435"/>
  <rect class="amber-card" x="508" y="184" width="174" height="100" rx="11"/>
  <text class="mono amber" x="558" y="222">tanh</text>
  <text class="small muted" x="532" y="250">candidate values</text>
  <rect class="amber-card" x="508" y="390" width="174" height="100" rx="11"/>
  <text class="mono amber" x="546" y="428">sigmoid</text>
  <text class="small muted" x="539" y="456">gate: 0 to 1</text>

  <path class="line" d="M682 234 L748 317"/>
  <path class="line" d="M682 440 L748 357"/>
  <circle class="circle" cx="766" cy="337" r="25"/>
  <text class="symbol ink" x="758" y="346">x</text>
  <text class="small muted" x="704" y="390">elementwise gate</text>

  <path class="line" d="M791 337 L854 337"/>
  <rect class="violet-card" x="860" y="291" width="162" height="92" rx="11"/>
  <text class="mono ink" x="900" y="327">z</text>
  <text class="small muted" x="883" y="354">gated features</text>

  <path class="line" d="M1022 318 L1080 254"/>
  <rect class="card" x="1086" y="178" width="122" height="92" rx="11"/>
  <text class="mono ink" x="1115" y="216">1 x 1</text>
  <text class="small muted" x="1106" y="244">projection</text>

  <path class="bypass" d="M115 298 L115 132 L1038 132 L1038 302 L1123 302"/>
  <circle class="circle" cx="1148" cy="302" r="25"/>
  <text class="symbol blue" x="1140" y="311">+</text>
  <path class="line" d="M1148 270 L1148 277"/>
  <path class="line" d="M1148 327 L1148 392"/>
  <rect class="blue-card" x="1068" y="398" width="160" height="86" rx="11"/>
  <text class="mono blue" x="1116" y="432">x_next</text>
  <text class="small muted" x="1090" y="458">to next block</text>
  <text class="small blue" x="308" y="120">residual route: preserve x, then add a learned update</text>

  <path class="skip" d="M941 383 L941 494"/>
  <rect class="green-card" x="850" y="500" width="182" height="72" rx="11"/>
  <text class="mono green" x="909" y="530">1 x 1</text>
  <text class="small muted" x="911" y="554">projection</text>
  <path class="skip" d="M1032 536 L1080 536"/>
  <rect class="green-card" x="1086" y="500" width="140" height="72" rx="11"/>
  <text class="mono green" x="1134" y="530">skip</text>
  <text class="small muted" x="1102" y="554">toward output</text>
  <text class="small green" x="680" y="606">skip route: send this block's useful evidence directly toward the prediction</text>

  <rect class="card" x="48" y="640" width="1178" height="52" rx="10"/>
  <text class="mono ink" x="70" y="672">x_next = x + residual_projection(z)  |  skip = skip_projection(z)</text>
</svg>
