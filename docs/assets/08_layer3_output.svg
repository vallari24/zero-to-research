<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 390" role="img" aria-labelledby="title desc">
  <title id="title">Layer 3 creates the full-context summary and output scores</title>
  <desc id="desc">Two four-character summaries become one eight-character summary, which produces 27 next-character logits.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .input { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
      .summary { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.5; }
      .out { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.5; }
      .ink { fill: #111827; }
      .muted { fill: #4b5563; }
      .orange { fill: #c2410c; }
      .purple { fill: #6d28d9; }
      .red { fill: #b91c1c; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .title { font: 800 25px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { font: 600 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 600 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="390" rx="20"/>
  <text class="title ink" x="32" y="46">Layer 3: create one full-context summary, then predict one character</text>
  <text class="text muted" x="32" y="74">This is where the model finally produces next-character scores.</text>

  <rect class="input" x="74" y="126" width="196" height="66" rx="10"/>
  <rect class="input" x="338" y="126" width="196" height="66" rx="10"/>
  <text class="mono orange" x="105" y="164">summary_abcd</text>
  <text class="mono orange" x="369" y="164">summary_efgh</text>

  <path class="line" d="M172 194 L268 242"/>
  <path class="line" d="M436 194 L340 242"/>
  <rect class="summary" x="200" y="246" width="214" height="78" rx="10"/>
  <text class="mono purple" x="227" y="280">summary_abcdefgh</text>
  <text class="small muted" x="266" y="304">200 features</text>

  <path class="line" d="M416 285 L614 285"/>
  <rect class="out" x="618" y="246" width="180" height="78" rx="10"/>
  <text class="mono red" x="654" y="278">27 logits</text>
  <text class="small muted" x="636" y="302">scores for . and a-z</text>

  <text class="mono ink" x="32" y="358">context: abcdefgh</text>
  <text class="mono red" x="230" y="358">training target: i</text>
  <text class="text ink" x="452" y="358">One loss trains every earlier layer through backpropagation.</text>
</svg>
