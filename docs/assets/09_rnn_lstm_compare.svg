<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 1060 450" role="img" aria-labelledby="title desc">
  <title id="title">RNN and LSTM conceptual comparison</title>
  <desc id="desc">A simple RNN has one memory vector, while an LSTM separates visible state and longer-lived memory.</desc>
  <rect width="1060" height="450" fill="#ffffff"/>
  <style>
    .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .head { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body { font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
    .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
    .rnn { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 18; }
    .lstm { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 18; }
    .state { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.7; rx: 12; }
    .arrow { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">What changes from RNN to LSTM?</text>

  <rect class="rnn" x="60" y="92" width="430" height="280"/>
  <text x="95" y="132" class="head">Simple RNN</text>
  <text x="95" y="166" class="body">Keeps one memory vector.</text>
  <rect class="state" x="95" y="190" width="155" height="48"/>
  <text x="124" y="220" class="mono">memory h</text>
  <path class="arrow" d="M 250 214 H 320"/>
  <rect class="state" x="320" y="190" width="125" height="48"/>
  <text x="350" y="220" class="mono">logits</text>
  <text x="95" y="276" class="body">Each character rewrites the same memory.</text>
  <text x="95" y="306" class="body">Useful for short context, but old information</text>
  <text x="95" y="336" class="body">can fade after many updates.</text>

  <rect class="lstm" x="570" y="92" width="430" height="280"/>
  <text x="605" y="132" class="head">LSTM</text>
  <text x="605" y="166" class="body">Keeps two connected states.</text>
  <rect class="state" x="605" y="190" width="150" height="48"/>
  <text x="630" y="220" class="mono">visible h</text>
  <rect class="state" x="790" y="190" width="155" height="48"/>
  <text x="812" y="220" class="mono">memory c</text>
  <text x="605" y="276" class="body">Small gates decide what to keep, write,</text>
  <text x="605" y="306" class="body">and reveal at each character.</text>
  <text x="605" y="336" class="body">This gives old information a cleaner path.</text>

  <path class="arrow" d="M 490 232 H 560"/>
  <text x="384" y="412" class="body">Same left-to-right reading idea, stronger memory control.</text>
</svg>
