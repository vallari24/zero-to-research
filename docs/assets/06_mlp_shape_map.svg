<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">Makemore MLP tensor shape map</title>
  <desc id="desc">A shape map showing character ids becoming embeddings, flattened context features, hidden activations, logits, and loss.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .box { fill: #ffffff; stroke: #d7dce2; stroke-width: 1.5; }
      .soft { fill: #f4f7fb; stroke: #d7dce2; stroke-width: 1.2; }
      .ink { fill: #1f2933; }
      .muted { fill: #627084; }
      .blue { fill: #2563eb; }
      .green { fill: #059669; }
      .orange { fill: #d97706; }
      .red { fill: #dc2626; }
      .line { stroke: #66758a; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .label { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758a"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="430" rx="18"/>
  <text x="38" y="48" class="label ink">The whole model in one shape map</text>
  <text x="38" y="78" class="text muted">Read left to right. Keep the batch axis B alive.</text>

  <g transform="translate(38 125)">
    <rect x="0" y="0" width="128" height="100" rx="10" class="box"/>
    <text x="24" y="33" class="label blue">Xb</text>
    <text x="24" y="60" class="text ink">[B, T]</text>
    <text x="24" y="82" class="small muted">ids</text>

    <path d="M140 50 L200 50" class="line"/>
    <text x="145" y="31" class="small muted">C[Xb]</text>

    <rect x="212" y="0" width="140" height="100" rx="10" class="box"/>
    <text x="236" y="33" class="label green">emb</text>
    <text x="236" y="60" class="text ink">[B, T, E]</text>
    <text x="236" y="82" class="small muted">vectors</text>

    <path d="M364 50 L424 50" class="line"/>
    <text x="368" y="31" class="small muted">view</text>

    <rect x="436" y="0" width="145" height="100" rx="10" class="box"/>
    <text x="460" y="33" class="label orange">embcat</text>
    <text x="460" y="60" class="text ink">[B, T*E]</text>
    <text x="460" y="82" class="small muted">flat row</text>

    <path d="M593 50 L653 50" class="line"/>
    <text x="594" y="31" class="small muted">@ W1 + b1</text>

    <rect x="665" y="0" width="128" height="100" rx="10" class="box"/>
    <text x="689" y="33" class="label blue">h</text>
    <text x="689" y="60" class="text ink">[B, H]</text>
    <text x="689" y="82" class="small muted">hidden</text>

    <path d="M805 50 L865 50" class="line"/>
    <text x="806" y="31" class="small muted">@ W2 + b2</text>

    <rect x="877" y="0" width="140" height="100" rx="10" class="box"/>
    <text x="901" y="33" class="label red">logits</text>
    <text x="901" y="60" class="text ink">[B, V]</text>
    <text x="901" y="82" class="small muted">scores</text>
  </g>

  <g transform="translate(145 280)">
    <rect x="0" y="0" width="170" height="80" rx="10" class="soft"/>
    <text x="22" y="31" class="text ink">B = examples</text>
    <text x="22" y="56" class="small muted">32 in training</text>
    <rect x="195" y="0" width="170" height="80" rx="10" class="soft"/>
    <text x="217" y="31" class="text ink">T = context</text>
    <text x="217" y="56" class="small muted">3 chars</text>
    <rect x="390" y="0" width="170" height="80" rx="10" class="soft"/>
    <text x="412" y="31" class="text ink">E = embedding</text>
    <text x="412" y="56" class="small muted">10 numbers</text>
    <rect x="585" y="0" width="170" height="80" rx="10" class="soft"/>
    <text x="607" y="31" class="text ink">H = hidden</text>
    <text x="607" y="56" class="small muted">200 neurons</text>
    <rect x="780" y="0" width="170" height="80" rx="10" class="soft"/>
    <text x="802" y="31" class="text ink">V = vocab</text>
    <text x="802" y="56" class="small muted">27 tokens</text>
  </g>
</svg>
