<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Bigram table and row normalization</title>
  <desc id="desc">A diagram showing current characters as rows, next characters as columns, then row normalization into probabilities.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .panel { fill: #fff; stroke: #d7dce2; stroke-width: 1.5; }
      .ink { fill: #1f2933; }
      .muted { fill: #627084; }
      .blue { fill: #2563eb; }
      .green { fill: #059669; }
      .orange { fill: #d97706; }
      .grid { fill: #f8fafc; stroke: #aeb8c5; stroke-width: 1; }
      .hi { fill: #fef3c7; stroke: #d97706; stroke-width: 1.2; }
      .line { stroke: #66758a; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .label { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758a"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="500" rx="18"/>
  <text x="38" y="48" class="label ink">Rows are current characters, columns are next characters</text>
  <text x="38" y="78" class="text muted">The count matrix becomes a probability matrix by row normalization.</text>

  <rect x="52" y="130" width="300" height="250" rx="10" class="panel"/>
  <text x="76" y="162" class="text blue">count matrix N [27,27]</text>
  <g transform="translate(86 196)">
    <rect x="0" y="0" width="180" height="140" class="grid"/>
    <line x1="0" y1="35" x2="180" y2="35" stroke="#d0d7df"/>
    <line x1="0" y1="70" x2="180" y2="70" stroke="#d0d7df"/>
    <line x1="0" y1="105" x2="180" y2="105" stroke="#d0d7df"/>
    <line x1="45" y1="0" x2="45" y2="140" stroke="#d0d7df"/>
    <line x1="90" y1="0" x2="90" y2="140" stroke="#d0d7df"/>
    <line x1="135" y1="0" x2="135" y2="140" stroke="#d0d7df"/>
    <rect x="0" y="0" width="180" height="35" class="hi"/>
    <text x="10" y="23" class="small ink">.</text>
    <text x="58" y="23" class="small ink">a</text>
    <text x="103" y="23" class="small ink">b</text>
    <text x="148" y="23" class="small ink">c</text>
  </g>
  <text x="76" y="354" class="small muted">row = current char</text>
  <text x="76" y="376" class="small muted">col = next char</text>

  <path d="M370 255 L440 255" class="line"/>
  <rect x="460" y="130" width="230" height="250" rx="10" class="panel"/>
  <text x="484" y="162" class="text green">row sums</text>
  <text x="484" y="192" class="small muted">sum across columns</text>
  <g transform="translate(500 228)">
    <rect x="0" y="0" width="96" height="38" rx="6" class="grid"/><text x="24" y="24" class="small ink">row 0</text>
    <rect x="0" y="50" width="96" height="38" rx="6" class="grid"/><text x="24" y="74" class="small ink">row 1</text>
    <rect x="0" y="100" width="96" height="38" rx="6" class="grid"/><text x="24" y="124" class="small ink">row 2</text>
  </g>
  <text x="484" y="354" class="small muted">keepdim=True makes [27,1]</text>

  <path d="M710 255 L780 255" class="line"/>
  <rect x="800" y="130" width="128" height="250" rx="10" class="panel"/>
  <text x="820" y="162" class="text orange">probabilities</text>
  <text x="820" y="192" class="small muted">each row sums to 1</text>
  <g transform="translate(820 228)">
    <rect x="0" y="0" width="88" height="34" rx="6" class="hi"/><text x="12" y="22" class="small ink">.10 .30</text>
    <rect x="0" y="50" width="88" height="34" rx="6" class="hi"/><text x="12" y="72" class="small ink">.05 .95</text>
  </g>
  <text x="820" y="340" class="small muted">normalize each row</text>
</svg>
