<svg xmlns="http://www.w3.org/2000/svg" width="900" height="338" viewBox="0 0 1040 390" role="img" aria-labelledby="title desc">
  <title id="title">Backpropagation through time</title>
  <desc id="desc">The loss sends gradients backward through the unrolled recurrent states and shared weights.</desc>
  <rect width="1040" height="390" fill="#ffffff"/>
  <style>
    .title { font: 700 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .label { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
    .small { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .mono { font: 600 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
    .node { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 16; }
    .loss { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 16; }
    .param { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 16; }
    .fwd { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .bwd { stroke: #dc2626; stroke-width: 2.2; fill: none; marker-end: url(#redarrow); stroke-dasharray: 8 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#64748b"/>
    </marker>
    <marker id="redarrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="40" y="48" class="title">Backward pass through time</text>
  <text x="40" y="82" class="small">The forward pass builds a chain. The backward pass walks that chain in reverse.</text>

  <rect class="node" x="90" y="150" width="130" height="70"/>
  <text class="mono" x="136" y="192">h_0</text>
  <rect class="node" x="350" y="150" width="130" height="70"/>
  <text class="mono" x="396" y="192">h_1</text>
  <rect class="node" x="610" y="150" width="130" height="70"/>
  <text class="mono" x="656" y="192">h_2</text>
  <rect class="loss" x="840" y="150" width="130" height="70"/>
  <text class="mono" x="876" y="192">loss</text>

  <path class="fwd" d="M 220 185 H 340"/>
  <path class="fwd" d="M 480 185 H 600"/>
  <path class="fwd" d="M 740 185 H 830"/>

  <path class="bwd" d="M 840 215 H 750"/>
  <path class="bwd" d="M 610 215 H 490"/>
  <path class="bwd" d="M 350 215 H 230"/>

  <rect class="param" x="360" y="285" width="300" height="58"/>
  <text class="mono" x="425" y="321">shared Wxh.grad</text>
  <path class="bwd" d="M 155 225 C 175 285 290 314 350 314"/>
  <path class="bwd" d="M 415 225 V 277"/>
  <path class="bwd" d="M 675 225 C 655 270 620 292 610 294"/>
  <text class="small" x="304" y="365">Every time step contributes to the same parameter gradient.</text>
</svg>
