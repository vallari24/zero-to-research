<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">BatchNorm target range before tanh</title>
  <desc id="desc">A diagram showing that pre-activations should be neither too small nor too large before tanh.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .panel { fill: #ffffff; stroke: #d7dce2; stroke-width: 1.5; }
      .ink { fill: #1f2933; }
      .muted { fill: #64748b; }
      .blue { stroke: #2563eb; fill: none; stroke-width: 4; stroke-linecap: round; }
      .green { stroke: #059669; fill: none; stroke-width: 4; stroke-linecap: round; }
      .orange { stroke: #d97706; fill: none; stroke-width: 4; stroke-linecap: round; }
      .axis { stroke: #475569; stroke-width: 1.5; }
      .guide { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 5 6; }
      .label { font: 700 23px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font: 500 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .tag { fill: #f1f5f9; stroke: #d7dce2; stroke-width: 1; }
      .bad { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; }
      .good { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1.2; }
    </style>
  </defs>
  <rect class="bg" width="1040" height="520" rx="18"/>
  <text x="42" y="52" class="label ink">BatchNorm keeps hpreact in a useful range</text>
  <text x="42" y="82" class="text muted">Before tanh, values should be centered and moderately spread out.</text>

  <rect x="56" y="120" width="288" height="318" rx="10" class="panel"/>
  <text x="82" y="154" class="text ink">too small</text>
  <rect x="82" y="174" width="116" height="30" rx="15" class="bad"/>
  <text x="99" y="194" class="small muted">std tiny</text>
  <line x1="90" y1="322" x2="302" y2="322" class="axis"/>
  <line x1="196" y1="236" x2="196" y2="368" class="axis"/>
  <path d="M98 364 C139 364, 161 357, 179 333 C188 320, 193 308, 196 300 C199 292, 204 280, 213 267 C231 243, 253 236, 294 236" class="blue"/>
  <rect x="184" y="244" width="24" height="112" rx="10" fill="#dbeafe" opacity="0.7"/>
  <text x="82" y="390" class="small muted">tanh barely changes</text>
  <text x="82" y="413" class="small muted">network behaves too linear</text>

  <rect x="376" y="120" width="288" height="318" rx="10" class="panel"/>
  <text x="402" y="154" class="text ink">healthy</text>
  <rect x="402" y="174" width="146" height="30" rx="15" class="good"/>
  <text x="419" y="194" class="small muted">mean 0, std ~1</text>
  <line x1="410" y1="322" x2="622" y2="322" class="axis"/>
  <line x1="516" y1="236" x2="516" y2="368" class="axis"/>
  <path d="M418 364 C459 364, 481 357, 499 333 C508 320, 513 308, 516 300 C519 292, 524 280, 533 267 C551 243, 573 236, 614 236" class="green"/>
  <rect x="468" y="244" width="96" height="112" rx="12" fill="#dcfce7" opacity="0.75"/>
  <line x1="468" y1="236" x2="468" y2="368" class="guide"/>
  <line x1="564" y1="236" x2="564" y2="368" class="guide"/>
  <text x="402" y="390" class="small muted">tanh has slope</text>
  <text x="402" y="413" class="small muted">gradients can pass through</text>

  <rect x="696" y="120" width="288" height="318" rx="10" class="panel"/>
  <text x="722" y="154" class="text ink">too large</text>
  <rect x="722" y="174" width="132" height="30" rx="15" class="bad"/>
  <text x="739" y="194" class="small muted">std huge</text>
  <line x1="730" y1="322" x2="942" y2="322" class="axis"/>
  <line x1="836" y1="236" x2="836" y2="368" class="axis"/>
  <path d="M738 364 C779 364, 801 357, 819 333 C828 320, 833 308, 836 300 C839 292, 844 280, 853 267 C871 243, 893 236, 934 236" class="orange"/>
  <rect x="730" y="236" width="54" height="132" rx="12" fill="#ffedd5" opacity="0.8"/>
  <rect x="888" y="236" width="54" height="132" rx="12" fill="#ffedd5" opacity="0.8"/>
  <line x1="784" y1="236" x2="784" y2="368" class="guide"/>
  <line x1="888" y1="236" x2="888" y2="368" class="guide"/>
  <text x="722" y="390" class="small muted">many values hit flat tails</text>
  <text x="722" y="413" class="small muted">gradients get crushed</text>

  <rect x="242" y="462" width="556" height="34" rx="17" class="tag"/>
  <text x="266" y="484" class="text muted">BatchNorm normalizes hpreact, then learned gain/bias can move it.</text>
</svg>
