<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">Dilation grows the receptive field by increasing the gap</title>
  <desc id="desc">Three rows show local connections with gap one, gap two, and gap four, allowing a prediction to reach eight past positions.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; }
      .orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
      .purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.5; }
      .ink { fill: #111827; }
      .muted { fill: #4b5563; }
      .gtext { fill: #047857; }
      .otext { fill: #c2410c; }
      .ptext { fill: #6d28d9; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .title { font: 800 25px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { font: 600 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 600 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="430" rx="20"/>
  <text class="title ink" x="32" y="46">Dilated: increase the gap so deeper layers reach farther back</text>
  <text class="text muted" x="32" y="74">Receptive field means: which earlier positions can influence this prediction?</text>

  <text class="mono gtext" x="42" y="148">gap 1</text>
  <rect class="green" x="212" y="116" width="128" height="52" rx="9"/>
  <rect class="green" x="388" y="116" width="128" height="52" rx="9"/>
  <rect class="green" x="564" y="116" width="128" height="52" rx="9"/>
  <rect class="green" x="740" y="116" width="128" height="52" rx="9"/>
  <text class="mono gtext" x="248" y="148">[x1 x2]</text>
  <text class="mono gtext" x="424" y="148">[x3 x4]</text>
  <text class="mono gtext" x="600" y="148">[x5 x6]</text>
  <text class="mono gtext" x="776" y="148">[x7 x8]</text>

  <text class="mono otext" x="42" y="244">gap 2</text>
  <path class="line" d="M276 170 L364 210"/>
  <path class="line" d="M452 170 L364 210"/>
  <path class="line" d="M628 170 L716 210"/>
  <path class="line" d="M804 170 L716 210"/>
  <rect class="orange" x="288" y="214" width="152" height="52" rx="9"/>
  <rect class="orange" x="640" y="214" width="152" height="52" rx="9"/>
  <text class="mono otext" x="322" y="246">[x1 .. x4]</text>
  <text class="mono otext" x="674" y="246">[x5 .. x8]</text>

  <text class="mono ptext" x="42" y="340">gap 4</text>
  <path class="line" d="M364 268 L540 306"/>
  <path class="line" d="M716 268 L540 306"/>
  <rect class="purple" x="450" y="310" width="180" height="52" rx="9"/>
  <text class="mono ptext" x="484" y="342">[x1 .. x8]</text>

  <text class="mono ink" x="32" y="400">1 local step -&gt; 2-character view; 2 layers -&gt; 4-character view; 3 layers -&gt; 8-character view</text>
</svg>
